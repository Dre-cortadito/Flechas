<!DOCTYPE html>
<!-- Flechas · Corriente — INTERACTIVE PROTOTYPE (loop feel only; not the shipping shell).
     Tap an arrow to rotate it (costs a giro, budget = 2). Press Encender, then tap a flecha to
     spark it: the current chains through every arrow it reaches and counts up. Reach the Reto. -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Corriente · prototipo · Flechas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  :root{ --bg:#ffffff; --paper:#fbfaf6; --ink:#1a1614; --ink-soft:#8a847f; --ink-line:#ece7df;
         --board:#FBEEE6; --teal:#4ECDC4; --teal-deep:#1E8E82; --fire:#F86624; --fire-deep:#C44E12;
         --dim:#d4cdc0; --ok:#157145; --heart:#ff6b6b;
         --fd:'Newsreader',Georgia,serif; --fu:'Helvetica Neue',Helvetica,Arial,sans-serif; }
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--fu);-webkit-font-smoothing:antialiased;}
  body{display:flex;flex-direction:column;align-items:center;padding:18px 14px 32px;}
  .head{display:flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:12px;}
  .eb{font:700 10px var(--fu);letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);}
  h1{font-family:var(--fd);font-weight:800;font-size:46px;letter-spacing:-1px;margin:0;line-height:.95;}
  h1 .dot{color:var(--fire);}
  .sub{font:italic 15px var(--fd);color:var(--ink-soft);margin-top:2px;}
  .status{width:min(92vw,430px);display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px auto 8px;}
  .chip{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;}
  .chip .v{font:800 22px var(--fd);font-variant-numeric:tabular-nums;line-height:1;}
  .chip .l{font:700 9px var(--fu);letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-soft);}
  .chip.reto .v{color:var(--fire);} .chip.count .v{color:var(--fire);}
  .hearts{display:flex;gap:3px;justify-content:center;}
  .hearts svg{width:22px;height:21px;} .hon{fill:var(--heart);} .hoff{fill:var(--ink-line);}
  .boardwrap{width:min(92vw,430px);}
  .board{position:relative;width:100%;aspect-ratio:1/1;background:var(--board);border-radius:20px;overflow:hidden;}
  #bsvg{display:block;width:100%;height:100%;}
  .ray{stroke:var(--fire);stroke-width:6;stroke-linecap:round;opacity:0;transition:opacity .18s;}
  .ray.on{opacity:.22;}
  .arr .sh,.arr .hd{fill:none;stroke:var(--ink);stroke-width:11;stroke-linecap:round;stroke-linejoin:round;
                    transition:stroke .15s;}
  .arr.dim .sh,.arr.dim .hd{stroke:var(--dim);stroke-width:9;}
  .arr.fired .sh,.arr.fired .hd{stroke:var(--fire);stroke-width:12;}
  .arr.spark .sh,.arr.spark .hd{stroke:var(--fire);}
  .arr .grp{transition:transform .16s ease;transform-box:fill-box;transform-origin:center;}
  .arr.pulse .grp{transform:scale(1.18);}
  .ring{fill:none;}
  .hit{fill:transparent;cursor:pointer;}
  .msg{width:min(92vw,430px);min-height:26px;text-align:center;font:700 15px var(--fu);margin:12px auto 6px;color:var(--ink);}
  .msg .big{font:800 22px var(--fd);}
  .controls{width:min(92vw,430px);display:flex;gap:10px;margin-top:4px;}
  button{flex:1;font:800 15px var(--fu);letter-spacing:.3px;border-radius:999px;padding:13px 10px;cursor:pointer;border:2px solid var(--ink-line);background:var(--paper);color:var(--ink);}
  button.spark{background:var(--fire);border-color:var(--fire);color:#fff;}
  button.spark.armed{background:var(--fire-deep);border-color:var(--fire-deep);animation:pulseb 1s infinite;}
  @keyframes pulseb{0%,100%{box-shadow:0 0 0 0 rgba(248,102,36,.4);}50%{box-shadow:0 0 0 7px rgba(248,102,36,0);}}
  button:disabled{opacity:.4;cursor:default;}
  .hint{width:min(92vw,430px);text-align:center;font:500 12.5px var(--fu);color:var(--ink-soft);margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
  <div class="head">
    <div class="eb">Flechas · prototipo</div>
    <h1>Corriente<span class="dot">.</span></h1>
    <div class="sub">Una chispa, una reacción en cadena.</div>
  </div>

  <div class="status">
    <div class="chip"><div class="v" id="turns">2</div><div class="l">Giros</div></div>
    <div class="hearts" id="hearts"></div>
    <div class="chip reto"><div class="v" id="reto">×0</div><div class="l">Reto</div></div>
    <div class="chip count"><div class="v" id="count">×0</div><div class="l">Corriente</div></div>
  </div>

  <div class="boardwrap"><div class="board"><svg id="bsvg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet"></svg></div></div>

  <div class="msg" id="msg">Toca una flecha para girarla.</div>

  <div class="controls">
    <button id="spark" class="spark">⚡ Encender</button>
    <button id="reset">Otra vez</button>
    <button id="nuevo">Nuevo</button>
  </div>
  <div class="hint">Gira hasta <b>2 flechas</b> para alinear la cadena, pulsa <b>Encender</b> y toca la <b>chispa</b>.
  Una corriente que no llega al Reto cuesta <b>media vida</b>.</div>

<script>
(function(){
  const N=6, U=100, MAXTURNS=2, HEARTS=3, FIZZLE_FLOOR_RATIO=0.5;
  const DIRS={R:[1,0],L:[-1,0],U:[0,-1],D:[0,1]}, CW=['R','D','L','U'];
  const $=id=>document.getElementById(id);
  const svg=$('bsvg');
  // ---- daily-ish RNG (deterministic per day; Nuevo uses random) ----
  function fnv(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  // ---- model ----
  const key=(r,c)=>r+','+c, rc=k=>k.split(',').map(Number);
  function genBoard(rng){ const m=new Map(); for(let r=0;r<N;r++)for(let c=0;c<N;c++){ if(rng()<0.74) m.set(key(r,c), CW[(rng()*4)|0]); } return m; }
  function rayHits(cells,k){ const [r,c]=rc(k),[dx,dy]=DIRS[cells.get(k)]; const out=[]; let nc=c+dx,nr=r+dy;
    while(nc>=0&&nc<N&&nr>=0&&nr<N){ const kk=key(nr,nc); if(cells.has(kk)) out.push(kk); nc+=dx; nr+=dy; } return out; }
  function simWaves(cells,start){ const fired=new Set(), waves=[]; let layer=[start];
    while(layer.length){ const cur=[...new Set(layer)].filter(k=>!fired.has(k)); if(!cur.length)break;
      cur.forEach(k=>fired.add(k)); waves.push(cur); const next=[];
      for(const k of cur) for(const nb of rayHits(cells,k)) if(!fired.has(nb)) next.push(nb); layer=next; }
    return {waves, count:fired.size}; }
  function bestChain(cells){ let b=0,bk=null; for(const k of cells.keys()){ const c=simWaves(cells,k).count; if(c>b){b=c;bk=k;} } return {b,bk}; }
  function retoFor(cells){ let board=new Map(cells); const L0=bestChain(board).b;
    for(let t=0;t<MAXTURNS;t++){ let cand=null; const baseNow=bestChain(board).b;
      for(const k of board.keys()) for(let s=1;s<4;s++){ const cc=new Map(board); cc.set(k,CW[(CW.indexOf(board.get(k))+s)%4]);
        const v=bestChain(cc).b; if(!cand||v>cand.v) cand={v,cc}; }
      if(cand&&cand.v>baseNow) board=cand.cc; }
    const Lmax=bestChain(board).b; const reto=Math.min(Lmax, Math.max(L0+2, Math.round(Lmax*0.78)));
    return Math.max(3,reto); }
  // ---- state ----
  let cells, origin, turns, hearts, reto, sparked, armed, total;
  function newGame(daily){ const seed = daily ? 'corriente-'+new Date().toISOString().slice(0,10) : 'r'+Math.random();
    let rng=mulberry32(fnv(seed)), tries=0;
    do{ cells=genBoard(rng); tries++; }while(cells.size<18 && tries<40);
    origin=new Map(cells); turns=MAXTURNS; sparked=false; armed=false; total=cells.size;
    reto=retoFor(cells); if(hearts==null) hearts=HEARTS; build(); render(); setMsg('Toca una flecha para girarla.'); }
  function resetSame(){ cells=new Map(origin); turns=MAXTURNS; sparked=false; armed=false; build(); render(); setMsg('Toca una flecha para girarla.'); }

  // ---- rendering ----
  function geom(d,cx,cy){ const [dx,dy]=DIRS[d], H=30, BK=16, W=13, px=-dy, py=dx;
    const tx=cx+dx*H, ty=cy+dy*H, tlx=cx-dx*H, tly=cy-dy*H, bx=tx-dx*BK, by=ty-dy*BK;
    return { sh:[tlx,tly,tx-dx*8,ty-dy*8], hd:[bx+px*W,by+py*W, tx,ty, bx-px*W,by-py*W] }; }
  function build(){ let s=`<g id="rays">`;
    for(const k of cells.keys()){ const [r,c]=rc(k); s+=`<line class="ray" id="ray-${r}-${c}" x1="0" y1="0" x2="0" y2="0"/>`; }
    s+=`</g><g id="arrs">`;
    for(const k of cells.keys()){ const [r,c]=rc(k); const cx=(c+.5)*U, cy=(r+.5)*U;
      s+=`<g class="arr" id="arr-${r}-${c}"><g class="grp"><path class="sh"/><path class="hd"/></g>`+
         `<circle class="ring" id="ring-${r}-${c}" cx="${cx}" cy="${cy}" r="42" stroke-width="6"/>`+
         `<rect class="hit" x="${c*U}" y="${r*U}" width="${U}" height="${U}" data-k="${k}"/></g>`; }
    s+=`</g>`; svg.innerHTML=s;
    svg.querySelectorAll('.hit').forEach(h=>h.addEventListener('click',()=>onCell(h.dataset.k))); }
  function drawArrow(k){ const [r,c]=rc(k), cx=(c+.5)*U, cy=(r+.5)*U, g=geom(cells.get(k),cx,cy);
    const G=$('arr-'+r+'-'+c); G.querySelector('.sh').setAttribute('d',`M ${g.sh[0]} ${g.sh[1]} L ${g.sh[2]} ${g.sh[3]}`);
    G.querySelector('.hd').setAttribute('d',`M ${g.hd[0]} ${g.hd[1]} L ${g.hd[2]} ${g.hd[3]} L ${g.hd[4]} ${g.hd[5]}`); }
  function render(){ for(const k of cells.keys()) drawArrow(k);
    $('turns').textContent=turns; $('reto').textContent='×'+reto; $('count').textContent='×'+(total&&sparked?lastCount:0);
    $('spark').classList.toggle('armed',armed); $('spark').textContent=armed?'Toca la chispa…':'⚡ Encender';
    $('spark').disabled=sparked; $('reset').disabled=false;
    let hh=''; for(let i=0;i<HEARTS;i++){ const on = i < Math.floor(hearts); const half = (i===Math.floor(hearts) && hearts%1>=0.5);
      hh+=`<svg viewBox="0 0 24 23"><path class="${on?'hon':'hoff'}" d="M12 21C5 16 2 12 2 8a5 5 0 0 1 10-1 5 5 0 0 1 10 1c0 4-3 8-10 13Z"/>${half?'<path class="hon" d="M12 21C5 16 2 12 2 8a5 5 0 0 1 10-1Z"/>':''}</svg>`; }
    $('hearts').innerHTML=hh; }
  let lastCount=0;
  function setMsg(h){ $('msg').innerHTML=h; }
  function clearMarks(){ svg.querySelectorAll('.arr').forEach(a=>a.classList.remove('fired','dim','spark','pulse'));
    svg.querySelectorAll('.ray').forEach(r=>r.classList.remove('on')); svg.querySelectorAll('.ring').forEach(r=>r.setAttribute('stroke','transparent')); }

  // ---- interaction ----
  function onCell(k){ if(sparked) return;
    if(armed){ doSpark(k); return; }
    if(turns<=0){ setMsg('Sin giros. Pulsa <b>Encender</b> y elige la chispa.'); return; }
    cells.set(k, CW[(CW.indexOf(cells.get(k))+1)%4]); turns--; drawArrow(k);
    const [r,c]=rc(k); const a=$('arr-'+r+'-'+c); a.classList.add('pulse'); setTimeout(()=>a.classList.remove('pulse'),160);
    $('turns').textContent=turns; setMsg(turns? 'Gira otra, o <b>Enciende</b>.' : 'Listo. Pulsa <b>Encender</b>.'); }
  $('spark').addEventListener('click',()=>{ if(sparked) return; armed=!armed; render(); setMsg(armed?'Toca la <b>chispa</b> 🔥':'Toca una flecha para girarla.'); });
  $('reset').addEventListener('click',resetSame);
  $('nuevo').addEventListener('click',()=>newGame(false));

  async function doSpark(start){ armed=false; sparked=true; render();
    const {waves,count}=simWaves(cells,start); lastCount=count;
    const [sr,scidx]=rc(start); $('arr-'+sr+'-'+scidx).classList.add('spark');
    let acc=0;
    for(const wave of waves){ for(const k of wave){ const [r,c]=rc(k); const a=$('arr-'+r+'-'+c); a.classList.add('fired');
        const ry=$('ray-'+r+'-'+c); const [dx,dy]=DIRS[cells.get(k)]; let nc=c+dx,nr=r+dy; while(nc>=0&&nc<N&&nr>=0&&nr<N){nc+=dx;nr+=dy;}
        const ex=((nc-dx)+.5)*U, ey=((nr-dy)+.5)*U, cx=(c+.5)*U, cy=(r+.5)*U;
        ry.setAttribute('x1',cx);ry.setAttribute('y1',cy);ry.setAttribute('x2',ex);ry.setAttribute('y2',ey);ry.classList.add('on'); }
      acc+=wave.length; $('count').textContent='×'+acc; await sleep(150); }
    for(const k of cells.keys()){ const [r,c]=rc(k); const a=$('arr-'+r+'-'+c); if(!a.classList.contains('fired')) a.classList.add('dim'); }
    finish(count); }
  function finish(count){ const win = count>=reto;
    if(win){ setMsg(`<span class="big" style="color:var(--ok)">¡Corriente ×${count}!</span> &nbsp;Reto logrado.`); }
    else { const fizzle = count < Math.max(3, Math.round(reto*FIZZLE_FLOOR_RATIO)); hearts-=0.5*(fizzle?1:0);
      setMsg(`<span class="big">Corriente ×${count}.</span> &nbsp;${count<reto?'Faltó para el Reto':''}${fizzle?' · −½ vida':''}`); render(); }
    if(hearts<=0){ hearts=0; render(); setMsg('<span class="big" style="color:var(--fire)">Sin vidas.</span> Pulsa Nuevo para reiniciar.');
      hearts=HEARTS; } }
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));

  // expose for smoke tests
  window.__cor={ state:()=>({n:cells.size,turns,reto,hearts,sparked}), spark:doSpark, best:()=>bestChain(cells).b, keys:()=>[...cells.keys()] };
  newGame(true);
})();
</script>
</body>
</html>
